<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>深度图 2.5D 视差 · Demo</title>
<style>
  :root {
    --bg: #0c0f0a;
    --panel: rgba(20, 26, 18, 0.72);
    --line: rgba(182, 255, 58, 0.22);
    --accent: #b6ff3a;
    --text: #e9f3df;
    --muted: #8aa07c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #16210f 0%, var(--bg) 60%);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, "Segoe UI", "Microsoft YaHei", sans-serif;
    min-height: 100%;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: 0.5px; }
  h1 .dot { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; line-height: 1.6; }

  .stage {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--line);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    touch-action: none; /* let us own drag gestures on mobile */
  }
  canvas { display: block; width: 100%; height: auto; }
  .hint {
    position: absolute; left: 12px; bottom: 12px;
    font-size: 12px; color: var(--text);
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    padding: 6px 10px; border-radius: 999px; pointer-events: none;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .panel {
    margin-top: 16px; padding: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    backdrop-filter: blur(8px);
  }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .row + .row { margin-top: 12px; }
  button, label.btn {
    appearance: none; cursor: pointer;
    background: rgba(182,255,58,0.10);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 9px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    transition: background .15s, transform .1s;
  }
  button:hover, label.btn:hover { background: rgba(182,255,58,0.20); }
  button:active, label.btn:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: #0c0f0a; border-color: var(--accent); }
  button.primary:hover { background: #c8ff5e; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  input[type=file] { display: none; }

  .ctrl { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  input[type=range] { accent-color: var(--accent); }
  input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }

  .status {
    margin-top: 12px; font-size: 12px; color: var(--muted);
    min-height: 18px; line-height: 1.5; word-break: break-word;
  }
  .status b { color: var(--accent); font-weight: 600; }
  .divider { height: 1px; background: var(--line); margin: 14px 0; border: 0; }
  code { background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 5px; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>深度图 2.5D 视差 <span class="dot">· Demo</span></h1>
  <p class="sub">
    桌面：移动鼠标。手机：用手指在图上拖动。<br />
    原理 = 一张彩色图 + 一张深度图，WebGL 着色器按深度做位移 → 近处动得多、远处动得少 = 景深/视差感。
  </p>

  <div class="stage" id="stage">
    <canvas id="gl"></canvas>
    <div class="hint" id="hint">移动鼠标 / 拖动试试</div>
  </div>

  <div class="panel">
    <div class="row">
      <label class="btn">上传图片<input type="file" id="fileImg" accept="image/*" /></label>
      <button id="btnSample">载入示例照片</button>
      <button id="btnAI" class="primary">AI 生成深度图</button>
      <label class="btn">手动上传深度图<input type="file" id="fileDepth" accept="image/*" /></label>
      <button id="btnReset">恢复合成场景</button>
    </div>

    <hr class="divider" />

    <div class="row">
      <div class="ctrl" style="flex:1; min-width:220px;">
        强度
        <input type="range" id="strength" min="0" max="0.12" step="0.001" value="0.045" style="flex:1;" />
        <span id="strengthVal" style="width:42px; text-align:right;">0.045</span>
      </div>
      <label class="ctrl"><input type="checkbox" id="invert" /> 反转深度</label>
      <label class="ctrl"><input type="checkbox" id="sway" checked /> 自动摆动</label>
      <button id="btnGyro">启用陀螺仪</button>
    </div>

    <div class="status" id="status">已加载内置合成场景。试着移动鼠标，或点 <b>载入示例照片</b> + <b>AI 生成深度图</b> 测真实照片。</div>
  </div>
</div>

<script>
/* =========================================================================
 * Depth-based 2.5D parallax — single-file demo, raw WebGL1 (mobile-friendly)
 * Two textures: color image + depth map. Fragment shader offsets the UV by
 * (depth - 0.5) * pointerOffset * strength, refined over a few iterations.
 * ========================================================================= */
(() => {
  const canvas = document.getElementById('gl');
  const stage  = document.getElementById('stage');
  const statusEl = document.getElementById('status');
  const hint   = document.getElementById('hint');

  const gl = canvas.getContext('webgl', { antialias: true, alpha: false })
          || canvas.getContext('experimental-webgl');
  if (!gl) { statusEl.innerHTML = '你的浏览器不支持 WebGL，无法运行此 demo。'; return; }

  const setStatus = (html) => { statusEl.innerHTML = html; };

  /* ---------- shaders ---------- */
  const VERT = `
    attribute vec2 aPos;
    varying vec2 vUv;
    void main() {
      vUv = aPos * 0.5 + 0.5;
      vUv.y = 1.0 - vUv.y;            // flip into image space
      gl_Position = vec4(aPos, 0.0, 1.0);
    }`;

  const FRAG = `
    #ifdef GL_FRAGMENT_PRECISION_HIGH
    precision highp float;
    #else
    precision mediump float;
    #endif
    varying vec2 vUv;
    uniform sampler2D uImage;
    uniform sampler2D uDepth;
    uniform vec2  uOffset;     // -1..1 pointer position
    uniform float uStrength;
    uniform float uInvert;     // 0 or 1
    uniform float uZoom;       // slight zoom hides edge stretching
    void main() {
      vec2 base = (vUv - 0.5) / uZoom + 0.5;
      vec2 dir  = uOffset * uStrength;
      vec2 uv   = base;
      // iterative refinement -> reduces smear at depth discontinuities
      for (int i = 0; i < 4; i++) {
        float d = texture2D(uDepth, uv).r;
        d = mix(d, 1.0 - d, uInvert);
        uv = base + dir * (d - 0.5);
      }
      gl_FragColor = texture2D(uImage, uv);
    }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const U = {
    image:    gl.getUniformLocation(prog, 'uImage'),
    depth:    gl.getUniformLocation(prog, 'uDepth'),
    offset:   gl.getUniformLocation(prog, 'uOffset'),
    strength: gl.getUniformLocation(prog, 'uStrength'),
    invert:   gl.getUniformLocation(prog, 'uInvert'),
    zoom:     gl.getUniformLocation(prog, 'uZoom'),
  };
  gl.uniform1i(U.image, 0);
  gl.uniform1i(U.depth, 1);
  gl.uniform1f(U.zoom, 1.06);

  function makeTexture(unit) {
    const tex = gl.createTexture();
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    // CLAMP + LINEAR -> works for non-power-of-two images in WebGL1
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    return tex;
  }
  const texImage = makeTexture(0);
  const texDepth = makeTexture(1);

  function upload(tex, unit, source) {
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, source);
  }

  /* ---------- state ---------- */
  const target  = { x: 0, y: 0 };   // where pointer/gyro wants the offset
  const current = { x: 0, y: 0 };   // smoothed actual offset
  let strength = 0.045;
  let invert = 0;
  let swayOn = true;
  let lastInputAt = 0;
  let imgW = 1, imgH = 1;
  let tSeconds = 0;

  function setCanvasSize(w, h) {
    const cap = 1600;                // cap drawing-buffer for perf
    const scale = Math.min(1, cap / Math.max(w, h));
    imgW = Math.round(w * scale);
    imgH = Math.round(h * scale);
    canvas.width = imgW;
    canvas.height = imgH;
  }

  /* ---------- render loop ---------- */
  function frame(ms) {
    tSeconds = ms / 1000;
    const idle = (ms - lastInputAt) > 2000;
    if (idle && swayOn) {
      target.x = Math.sin(tSeconds * 0.6) * 0.45;
      target.y = Math.cos(tSeconds * 0.45) * 0.25;
    } else if (idle) {
      target.x *= 0.92; target.y *= 0.92;
    }
    current.x += (target.x - current.x) * 0.08;   // smooth follow
    current.y += (target.y - current.y) * 0.08;

    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(U.offset, current.x, current.y);
    gl.uniform1f(U.strength, strength);
    gl.uniform1f(U.invert, invert);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ---------- input: pointer (mouse + touch drag) ---------- */
  function pointer(e) {
    const r = stage.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top) / r.height;
    target.x = (x * 2 - 1);
    target.y = -(y * 2 - 1);
    lastInputAt = performance.now();
  }
  stage.addEventListener('pointermove', pointer);
  stage.addEventListener('pointerdown', pointer);

  /* ---------- input: gyroscope (mobile bonus) ---------- */
  function onOrient(e) {
    if (e.gamma == null) return;
    target.x = Math.max(-1, Math.min(1, e.gamma / 30));        // left/right tilt
    target.y = Math.max(-1, Math.min(1, (e.beta - 45) / 30));  // front/back tilt
    lastInputAt = performance.now();
  }
  document.getElementById('btnGyro').addEventListener('click', async () => {
    try {
      const DOE = window.DeviceOrientationEvent;
      if (DOE && typeof DOE.requestPermission === 'function') {
        const res = await DOE.requestPermission();         // iOS 13+ needs gesture
        if (res !== 'granted') { setStatus('陀螺仪权限被拒绝。'); return; }
      }
      window.addEventListener('deviceorientation', onOrient);
      setStatus('陀螺仪已启用，倾斜手机看看。<br><span style="color:#8aa07c">提示：安卓需 https 或 localhost 才会触发，局域网 http 可能无效——用手指拖动一样能看效果。</span>');
    } catch (err) { setStatus('陀螺仪不可用：' + err.message); }
  });

  /* ---------- controls ---------- */
  const strengthEl = document.getElementById('strength');
  const strengthVal = document.getElementById('strengthVal');
  strengthEl.addEventListener('input', () => {
    strength = parseFloat(strengthEl.value);
    strengthVal.textContent = strength.toFixed(3);
  });
  document.getElementById('invert').addEventListener('change', (e) => { invert = e.target.checked ? 1 : 0; });
  document.getElementById('sway').addEventListener('change', (e) => { swayOn = e.target.checked; });

  /* ---------- loading images ---------- */
  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  let colorImg = null;   // keep the current color image for AI depth

  async function setColor(src) {
    const img = await loadImage(src);
    colorImg = img;
    setCanvasSize(img.naturalWidth, img.naturalHeight);
    upload(texImage, 0, img);
  }
  async function setDepth(src) {
    const img = await loadImage(src);
    upload(texDepth, 1, img);
  }

  /* ---------- built-in synthetic scene (works with zero downloads) ---------- */
  function synthetic() {
    const W = 1200, H = 800;
    const c = document.createElement('canvas'); c.width = W; c.height = H;
    const d = document.createElement('canvas'); d.width = W; d.height = H;
    const cx = c.getContext('2d'), dx = d.getContext('2d');

    // sky (far)
    const sky = cx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#243a6e'); sky.addColorStop(1, '#7a4a78');
    cx.fillStyle = sky; cx.fillRect(0, 0, W, H);
    dx.fillStyle = '#141414'; dx.fillRect(0, 0, W, H);     // depth ~0.08 (far)

    // moon
    cx.fillStyle = '#ffeec2'; cx.beginPath(); cx.arc(W*0.78, H*0.26, 70, 0, 7); cx.fill();
    dx.fillStyle = '#1f1f1f'; dx.beginPath(); dx.arc(W*0.78, H*0.26, 70, 0, 7); dx.fill();

    // stars
    cx.fillStyle = 'rgba(255,255,255,.8)';
    for (let i = 0; i < 60; i++) {
      const sx = (i*97 % W), sy = ((i*53) % (H*0.5));
      cx.fillRect(sx, sy, 2, 2);
    }

    // far mountains (depth ~0.3)
    const ranges = [
      { col: '#2a3358', dep: '#4d4d4d', base: 0.58, amp: 70, step: 0.013, ph: 0 },
      { col: '#33415f', dep: '#666666', base: 0.66, amp: 90, step: 0.016, ph: 2 },
    ];
    ranges.forEach(r => {
      [[cx, r.col], [dx, r.dep]].forEach(([ctx, fill]) => {
        ctx.fillStyle = fill; ctx.beginPath(); ctx.moveTo(0, H);
        for (let x = 0; x <= W; x += 8)
          ctx.lineTo(x, H*r.base + Math.sin(x*r.step + r.ph)*r.amp);
        ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
      });
    });

    // mid hills (depth ~0.6)
    [[cx, '#2f5d3a'], [dx, '#9a9a9a']].forEach(([ctx, fill]) => {
      ctx.fillStyle = fill; ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 8)
        ctx.lineTo(x, H*0.78 + Math.sin(x*0.02 + 1)*50);
      ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
    });

    // foreground subject (depth ~0.92, moves the most)
    cx.fillStyle = '#0e140d';
    cx.beginPath(); cx.ellipse(W*0.32, H*0.92, 230, 200, 0, 0, 7); cx.fill();
    dx.fillStyle = '#ededed';
    dx.beginPath(); dx.ellipse(W*0.32, H*0.92, 230, 200, 0, 0, 7); dx.fill();

    return { color: c, depth: d };
  }

  function loadSynthetic() {
    const { color, depth } = synthetic();
    colorImg = color;
    setCanvasSize(color.width, color.height);
    upload(texImage, 0, color);
    upload(texDepth, 1, depth);
    setStatus('已加载内置合成场景。前景的暗色椭圆位移最大 = 离你最近。');
  }
  loadSynthetic();

  /* ---------- buttons ---------- */
  document.getElementById('btnReset').addEventListener('click', loadSynthetic);

  document.getElementById('fileImg').addEventListener('change', async (e) => {
    const f = e.target.files[0]; if (!f) return;
    const url = URL.createObjectURL(f);
    await setColor(url);
    setStatus('已载入图片。现在点 <b>AI 生成深度图</b> 给它估深度，或手动上传深度图。');
  });

  document.getElementById('fileDepth').addEventListener('change', async (e) => {
    const f = e.target.files[0]; if (!f) return;
    await setDepth(URL.createObjectURL(f));
    setStatus('已载入深度图。默认约定：<b>白=近，黑=远</b>。如果效果反了，勾选 <b>反转深度</b>。');
  });

  document.getElementById('btnSample').addEventListener('click', async () => {
    try {
      await setColor('/mos-design-xGc2QsidjHA-unsplash.jpg');
      setStatus('已载入示例照片（你 public 里的真实照片）。现在点 <b>AI 生成深度图</b> 看真实图片效果。');
    } catch {
      setStatus('没找到 /mos-design-xGc2QsidjHA-unsplash.jpg，请改用「上传图片」。');
    }
  });

  /* ---------- AI depth: transformers.js + Depth Anything (lazy-loaded) ---------- */
  let depthPipe = null;
  async function getPipe() {
    if (depthPipe) return depthPipe;
    const mod = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3');
    const { pipeline } = mod;
    const models = ['onnx-community/depth-anything-v2-small', 'Xenova/depth-anything-small-hf'];
    for (const id of models) {
      try {
        try { depthPipe = await pipeline('depth-estimation', id, { device: 'webgpu' }); }
        catch { depthPipe = await pipeline('depth-estimation', id); }  // fallback: wasm
        return depthPipe;
      } catch (e) { /* try next model id */ }
    }
    throw new Error('深度模型加载失败（可能网络无法访问 jsdelivr / HuggingFace CDN）');
  }

  document.getElementById('btnAI').addEventListener('click', async () => {
    const btn = document.getElementById('btnAI');
    if (!colorImg) { setStatus('请先上传图片或载入示例照片。'); return; }
    if (colorImg.tagName !== 'IMG') { setStatus('合成场景已自带深度图。请先「上传图片」或「载入示例照片」。'); return; }
    btn.disabled = true;
    try {
      setStatus('正在加载深度模型…首次需下载约 <b>40MB</b>，请稍候（之后会缓存）。');
      const pipe = await getPipe();
      setStatus('模型就绪，正在推理深度…');
      const out = await pipe(colorImg.src);            // { depth: RawImage }
      const dcanvas = out.depth.toCanvas();            // grayscale, white=near
      upload(texDepth, 1, dcanvas);
      setStatus('✅ 深度已生成（白=近黑=远）。移动鼠标 / 拖动看效果。若方向不对勾选 <b>反转深度</b>。');
    } catch (err) {
      setStatus('深度生成失败：' + err.message + '<br><span style="color:#8aa07c">可改用「手动上传深度图」，或检查网络是否能访问 CDN。</span>');
    } finally {
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
