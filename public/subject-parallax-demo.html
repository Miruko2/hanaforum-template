<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>主体视差（无残影）· Demo</title>
<style>
  :root {
    --bg: #0c0f0a; --panel: rgba(20,26,18,.72); --line: rgba(182,255,58,.22);
    --accent: #b6ff3a; --text: #e9f3df; --muted: #8aa07c;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; min-height:100%;
    background: radial-gradient(1200px 600px at 50% -10%, #16210f 0%, var(--bg) 60%);
    color: var(--text); font-family: ui-sans-serif, system-ui, "Segoe UI", "Microsoft YaHei", sans-serif; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing:.5px; }
  h1 .dot { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; line-height: 1.6; }
  .stage { position: relative; width: 100%; border-radius: 14px; overflow: hidden;
    background:#000; border:1px solid var(--line); box-shadow:0 10px 40px rgba(0,0,0,.5);
    touch-action: none; }
  canvas { display:block; width:100%; height:auto; }
  .hint { position:absolute; left:12px; bottom:12px; font-size:12px; color:var(--text);
    background:rgba(0,0,0,.45); backdrop-filter:blur(4px); padding:6px 10px; border-radius:999px;
    pointer-events:none; border:1px solid rgba(255,255,255,.12); }
  .panel { margin-top:16px; padding:14px; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; backdrop-filter:blur(8px); }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .row + .row { margin-top:12px; }
  button, label.btn { appearance:none; cursor:pointer; background:rgba(182,255,58,.10); color:var(--text);
    border:1px solid var(--line); padding:9px 14px; border-radius:10px; font-size:13px; font-weight:600;
    transition: background .15s, transform .1s; }
  button:hover, label.btn:hover { background:rgba(182,255,58,.20); }
  button:active, label.btn:active { transform: translateY(1px); }
  button.primary { background:var(--accent); color:#0c0f0a; border-color:var(--accent); }
  button.primary:hover { background:#c8ff5e; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  input[type=file] { display:none; }
  .ctrl { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
  input[type=range] { accent-color: var(--accent); }
  input[type=checkbox] { accent-color: var(--accent); width:16px; height:16px; }
  .status { margin-top:12px; font-size:12px; color:var(--muted); min-height:18px; line-height:1.5; word-break:break-word; }
  .status b { color: var(--accent); font-weight:600; }
  .divider { height:1px; background:var(--line); margin:14px 0; border:0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>主体视差（无残影）<span class="dot">· Demo</span></h1>
  <p class="sub">
    桌面：移动鼠标（左右最明显）。手机：手指在图上拖动。<br />
    原理 = isnet-anime 抠出角色当"深度图"（角色近/背景远，边缘羽化）→ <b>单张图</b>按深度扭曲 UV。
    单图位移没有第二层副本，所以<b>不会有残影</b>。
  </p>

  <div class="stage" id="stage">
    <canvas id="gl"></canvas>
    <div class="hint" id="hint">移动鼠标 / 拖动试试</div>
  </div>

  <div class="panel">
    <div class="row">
      <label class="btn">上传图片<input type="file" id="fileImg" accept="image/*" /></label>
      <button id="btnSample">载入示例照片</button>
      <button id="btnAI" class="primary">AI 抠像（动漫人物）</button>
      <label class="btn">手动上传遮罩<input type="file" id="fileMask" accept="image/*" /></label>
      <button id="btnReset">恢复合成场景</button>
    </div>
    <hr class="divider" />
    <div class="row">
      <div class="ctrl" style="flex:1; min-width:220px;">
        强度
        <input type="range" id="strength" min="0" max="0.12" step="0.001" value="0.05" style="flex:1;" />
        <span id="strengthVal" style="width:42px; text-align:right;">0.050</span>
      </div>
      <label class="ctrl"><input type="checkbox" id="sway" checked /> 自动摆动</label>
      <button id="btnGyro">启用陀螺仪</button>
    </div>
    <div class="status" id="status">已加载内置合成场景。移动鼠标看主体视差，或点 <b>载入示例照片</b> + <b>AI 抠像</b> 测真实图。</div>
  </div>
</div>

<script>
/* ===========================================================================
 * Subject parallax via single-image depth displacement (NO ghosting).
 *  - Segmentation: skytnt/anime-seg (isnetis.onnx) via onnxruntime-web (wasm/CPU).
 *  - Depth = feathered subject mask (subject≈1 near, background≈0 far).
 *  - Render: ONE image, fragment shader displaces UV by (depth - PIVOT). A single
 *    texture means no duplicated layer -> no double-image / residual ghost.
 * =========================================================================== */
(() => {
  const canvas = document.getElementById('gl');
  const stage  = document.getElementById('stage');
  const statusEl = document.getElementById('status');
  const setStatus = (html) => { statusEl.innerHTML = html; };

  const gl = canvas.getContext('webgl', { antialias: true, alpha: false })
          || canvas.getContext('experimental-webgl');
  if (!gl) { setStatus('你的浏览器不支持 WebGL。'); return; }

  /* ---------- shaders: single-image depth displacement ---------- */
  const VERT = `
    attribute vec2 aPos; varying vec2 vUv;
    void main(){ vUv = aPos*0.5+0.5; vUv.y = 1.0-vUv.y; gl_Position = vec4(aPos,0.0,1.0); }`;
  const FRAG = `
    #ifdef GL_FRAGMENT_PRECISION_HIGH
    precision highp float;
    #else
    precision mediump float;
    #endif
    varying vec2 vUv;
    uniform sampler2D uImage;
    uniform sampler2D uDepth;
    uniform vec2  uOffset;     // -1..1 pointer
    uniform float uStrength;
    uniform float uZoom;
    const float PIVOT = 0.2;   // bg (depth~0) barely moves, subject (depth~1) moves most
    void main(){
      vec2 base = (vUv-0.5)/uZoom + 0.5;
      vec2 dir  = uOffset * uStrength;
      vec2 uv   = base;
      for (int i=0;i<4;i++){           // iterative refinement softens edge stretch
        float d = texture2D(uDepth, uv).r;
        uv = base + dir * (d - PIVOT);
      }
      gl_FragColor = texture2D(uImage, uv);
    }`;

  function compile(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog); gl.useProgram(prog);

  const vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog,'aPos');
  gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

  const U = {
    image: gl.getUniformLocation(prog,'uImage'), depth: gl.getUniformLocation(prog,'uDepth'),
    offset: gl.getUniformLocation(prog,'uOffset'), strength: gl.getUniformLocation(prog,'uStrength'),
    zoom: gl.getUniformLocation(prog,'uZoom'),
  };
  gl.uniform1i(U.image,0); gl.uniform1i(U.depth,1); gl.uniform1f(U.zoom,1.06);

  function makeTex(unit){ const t=gl.createTexture(); gl.activeTexture(gl.TEXTURE0+unit);
    gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR); return t; }
  const texImage = makeTex(0), texDepth = makeTex(1);
  function upload(tex, unit, src){ gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,src); }

  /* ---------- state + render loop ---------- */
  const target={x:0,y:0}, current={x:0,y:0};
  let strength=0.05, swayOn=true, lastInputAt=0;
  function frame(ms){
    const t=ms/1000, idle=(ms-lastInputAt)>2000;
    if(idle&&swayOn){ target.x=Math.sin(t*0.6)*0.5; target.y=Math.cos(t*0.45)*0.25; }
    else if(idle){ target.x*=0.92; target.y*=0.92; }
    current.x+=(target.x-current.x)*0.08; current.y+=(target.y-current.y)*0.08;
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform2f(U.offset,current.x,current.y); gl.uniform1f(U.strength,strength);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ---------- input ---------- */
  function pointer(e){ const r=stage.getBoundingClientRect();
    target.x=((e.clientX-r.left)/r.width)*2-1; target.y=-(((e.clientY-r.top)/r.height)*2-1);
    lastInputAt=performance.now(); }
  stage.addEventListener('pointermove',pointer); stage.addEventListener('pointerdown',pointer);
  function onOrient(e){ if(e.gamma==null) return;
    target.x=Math.max(-1,Math.min(1,e.gamma/30)); target.y=Math.max(-1,Math.min(1,(e.beta-45)/30));
    lastInputAt=performance.now(); }
  document.getElementById('btnGyro').addEventListener('click', async ()=>{
    try{ const DOE=window.DeviceOrientationEvent;
      if(DOE&&typeof DOE.requestPermission==='function'){ const r=await DOE.requestPermission();
        if(r!=='granted'){ setStatus('陀螺仪权限被拒绝。'); return; } }
      window.addEventListener('deviceorientation',onOrient);
      setStatus('陀螺仪已启用，倾斜手机看看。<br><span style="color:#8aa07c">安卓需 https/localhost 才触发，局域网 http 用拖动一样能看。</span>');
    }catch(err){ setStatus('陀螺仪不可用：'+err.message); }
  });

  /* ---------- controls ---------- */
  const sEl=document.getElementById('strength'), sVal=document.getElementById('strengthVal');
  sEl.addEventListener('input',()=>{ strength=parseFloat(sEl.value); sVal.textContent=strength.toFixed(3); });
  document.getElementById('sway').addEventListener('change',e=>{ swayOn=e.target.checked; });

  /* ---------- helpers ---------- */
  function loadImage(src){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous';
    i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }
  function dims(x){ return [x.naturalWidth||x.width, x.naturalHeight||x.height]; }

  let currentImg = null;
  let imgW=1, imgH=1;
  function setCanvasSize(w,h){ const cap=1600, k=Math.min(1,cap/Math.max(w,h));
    imgW=Math.round(w*k); imgH=Math.round(h*k); canvas.width=imgW; canvas.height=imgH; }

  /* Build the depth texture from a mask/grayscale source (drawn over black so that
   * either alpha-mask OR grayscale becomes the red channel), feathered for a smooth
   * displacement gradient at the subject edge. */
  function buildFromMask(src, maskSrc){
    const [w,h]=dims(src);
    setCanvasSize(w,h); upload(texImage,0,src);
    const d=document.createElement('canvas'); d.width=w; d.height=h; const dx=d.getContext('2d');
    dx.fillStyle='#000'; dx.fillRect(0,0,w,h);
    dx.filter='blur('+Math.max(2,Math.round(Math.max(w,h)*0.012))+'px)';   // feather edges
    dx.drawImage(maskSrc,0,0,w,h);
    dx.filter='none';
    upload(texDepth,1,d);
  }

  /* Show an image flat (constant depth = PIVOT -> zero displacement) before segmentation. */
  function showFlat(src){
    const [w,h]=dims(src); setCanvasSize(w,h); upload(texImage,0,src);
    const d=document.createElement('canvas'); d.width=2; d.height=2; const dx=d.getContext('2d');
    dx.fillStyle='rgb(51,51,51)'; dx.fillRect(0,0,2,2);   // 51/255 ≈ 0.2 = PIVOT
    upload(texDepth,1,d);
  }

  /* ---------- synthetic instant scene ---------- */
  function synthetic(){
    const W=1200,H=800;
    const c=document.createElement('canvas'); c.width=W; c.height=H; const cx=c.getContext('2d');
    const sky=cx.createLinearGradient(0,0,0,H); sky.addColorStop(0,'#243a6e'); sky.addColorStop(1,'#7a4a78');
    cx.fillStyle=sky; cx.fillRect(0,0,W,H);
    cx.fillStyle='#ffeec2'; cx.beginPath(); cx.arc(W*0.78,H*0.26,70,0,7); cx.fill();
    cx.fillStyle='rgba(255,255,255,.8)'; for(let i=0;i<60;i++){ cx.fillRect((i*97)%W,(i*53)%(H*0.5),2,2); }
    [['#2a3358',0.58,70,0.013,0],['#33415f',0.66,90,0.016,2]].forEach(([col,b,a,st,ph])=>{
      cx.fillStyle=col; cx.beginPath(); cx.moveTo(0,H);
      for(let x=0;x<=W;x+=8) cx.lineTo(x,H*b+Math.sin(x*st+ph)*a); cx.lineTo(W,H); cx.closePath(); cx.fill(); });
    cx.fillStyle='#2f5d3a'; cx.beginPath(); cx.moveTo(0,H);
    for(let x=0;x<=W;x+=8) cx.lineTo(x,H*0.78+Math.sin(x*0.02+1)*50); cx.lineTo(W,H); cx.closePath(); cx.fill();
    cx.fillStyle='#0e140d'; cx.beginPath(); cx.ellipse(W*0.34,H*0.95,210,230,0,0,7); cx.fill();
    const m=document.createElement('canvas'); m.width=W; m.height=H; const mx=m.getContext('2d');
    mx.fillStyle='#fff'; mx.beginPath(); mx.ellipse(W*0.34,H*0.95,210,230,0,0,7); mx.fill();
    return { color:c, mask:m };
  }
  function loadSynthetic(){ const {color,mask}=synthetic(); currentImg=color; buildFromMask(color,mask);
    setStatus('已加载内置合成场景：暗色主体随鼠标位移（背景近乎不动）。无残影。'); }
  loadSynthetic();

  /* ---------- buttons ---------- */
  document.getElementById('btnReset').addEventListener('click', loadSynthetic);
  document.getElementById('fileImg').addEventListener('change', async e=>{
    const f=e.target.files[0]; if(!f) return;
    try{ currentImg=await loadImage(URL.createObjectURL(f)); showFlat(currentImg);
      setStatus('已载入图片，已显示原图。点 <b>AI 抠像</b> 抠出主体，或手动上传遮罩。'); }
    catch(err){ setStatus('图片载入失败：'+err.message); } });
  document.getElementById('fileMask').addEventListener('change', async e=>{
    const f=e.target.files[0]; if(!f||!currentImg){ setStatus('请先载入图片再传遮罩。'); return; }
    const m=await loadImage(URL.createObjectURL(f)); buildFromMask(currentImg,m);
    setStatus('已用手动遮罩（白=主体/近，黑=背景/远）。'); });
  document.getElementById('btnSample').addEventListener('click', async ()=>{
    try{ currentImg=await loadImage('/mos-design-xGc2QsidjHA-unsplash.jpg'); showFlat(currentImg);
      setStatus('已载入示例照片。点 <b>AI 抠像</b> 抠出主体看视差。<br><span style="color:#8aa07c">注：示例是真人照片；动漫插画用 isnet-anime 效果更准。</span>');
    }catch{ setStatus('没找到示例图，请用「上传图片」。'); } });

  /* ---------- isnet-anime via Web Worker (ORT engine inlined; CPU/wasm backend) ----------
   * Everything (engine js / wasm / model) is fetched on the MAIN thread (same-origin /ort/
   * works; worker importScripts does not) and handed to the worker, which only computes. */
  async function fetchWithProgress(url, onP){ const r=await fetch(url);
    if(!r.ok) throw new Error('下载失败 HTTP '+r.status);
    const total=+r.headers.get('content-length')||0; const rd=r.body.getReader();
    let got=0; const chunks=[]; for(;;){ const {done,value}=await rd.read(); if(done) break;
      chunks.push(value); got+=value.length; onP&&onP(got,total); }
    const out=new Uint8Array(got); let p=0; for(const c of chunks){ out.set(c,p); p+=c.length; } return out; }
  async function fetchText(url){ const r=await fetch(url); if(!r.ok) throw new Error(url+' HTTP '+r.status); return await r.text(); }

  // Worker LOGIC only — ORT engine code is prepended on the main thread, so self.ort exists.
  const WORKER_LOGIC = [
    "var session=null;",
    "self.onmessage=async (e)=>{ var m=e.data; try{",
    "  if(m.type==='init'){ var ort=self.ort;",
    "    if(!ort) throw new Error('ORT 内联失败：self.ort 为空');",
    "    try{ ort.env.wasm.wasmBinary=m.wasm; }catch(e2){}",
    "    ort.env.wasm.wasmPaths=m.ortBase;",
    "    ort.env.wasm.numThreads=1;",
    "    session=await ort.InferenceSession.create(new Uint8Array(m.model),{executionProviders:['wasm']});",
    "    self.postMessage({type:'ready'}); }",
    "  else if(m.type==='run'){ var ort2=self.ort; var t=new ort2.Tensor('float32',m.data,[1,3,1024,1024]);",
    "    var out=await session.run({img:t}); var arr=out[session.outputNames[0]].data;",
    "    self.postMessage({type:'result',data:arr},[arr.buffer]); }",
    "}catch(err){ self.postMessage({type:'error',error:(err&&err.message)||String(err)}); } };"
  ].join('\n');

  let segWorker=null, segReady=false, pendingJob=null;
  function ensureWorker(ortCode){ if(segWorker) return;
    var src = ortCode + "\n;\n" + WORKER_LOGIC;
    segWorker=new Worker(URL.createObjectURL(new Blob([src],{type:'application/javascript'})));
    segWorker.onmessage=(e)=>{ const job=pendingJob; pendingJob=null; if(!job) return;
      if(e.data.type==='error') job.reject(new Error(e.data.error)); else job.resolve(e.data); };
    segWorker.onerror=(e)=>{ const job=pendingJob; pendingJob=null;
      if(job) job.reject(new Error((e&&e.message)||'worker 出错')); }; }
  function workerCall(msg, transfer){ return new Promise((resolve,reject)=>{
    pendingJob={resolve,reject}; segWorker.postMessage(msg, transfer||[]); }); }

  async function ensureSession(){ if(segReady) return;
    setStatus('加载推理引擎（本地 /ort/）…');
    const ortCode=await fetchText('/ort/ort.webgpu.min.js');
    const wasm=await fetchWithProgress('/ort/ort-wasm-simd-threaded.jsep.wasm',
      (g,t)=>{ const mb=(g/1048576).toFixed(0); const pct=t?` ${Math.round(g/t*100)}%`:''; setStatus(`加载 wasm 内核…${mb}MB${pct}`); });
    const model=await fetchWithProgress('https://huggingface.co/skytnt/anime-seg/resolve/main/isnetis.onnx',
      (g,t)=>{ const mb=(g/1048576).toFixed(0); const pct=t?` ${Math.round(g/t*100)}%`:'';
        setStatus(`下载分割模型…${mb}MB${pct}（首次约 <b>176MB</b>，之后浏览器缓存）`); });
    ensureWorker(ortCode);
    setStatus('后台初始化推理引擎…（页面不会卡死）');
    await workerCall({type:'init',model:model.buffer,wasm:wasm.buffer,ortBase:location.origin+'/ort/'},[model.buffer,wasm.buffer]); segReady=true; }

  // Run isnet-anime in the worker -> returns an alpha-mask canvas at original size.
  async function segment(img){
    await ensureSession();
    const S=1024, [w0,h0]=dims(img), k=S/Math.max(w0,h0);
    const dw=Math.round(w0*k), dh=Math.round(h0*k), ox=Math.floor((S-dw)/2), oy=Math.floor((S-dh)/2);
    const c=document.createElement('canvas'); c.width=S; c.height=S; const cx=c.getContext('2d');
    cx.fillStyle='#000'; cx.fillRect(0,0,S,S); cx.drawImage(img,ox,oy,dw,dh);
    const data=cx.getImageData(0,0,S,S).data, plane=S*S, chw=new Float32Array(3*plane);
    for(let i=0;i<plane;i++){ chw[i]=data[i*4]/255; chw[plane+i]=data[i*4+1]/255; chw[2*plane+i]=data[i*4+2]/255; }
    setStatus('正在后台推理分割…（CPU 计算，约 5–30 秒，期间页面不卡）');
    const res=await workerCall({type:'run',data:chw},[chw.buffer]);
    const mask=res.data;
    let mn=Infinity,mx=-Infinity; for(let i=0;i<mask.length;i++){ const v=mask[i]; if(v<mn)mn=v; if(v>mx)mx=v; }
    const rng=(mx-mn)||1;
    const mc=document.createElement('canvas'); mc.width=S; mc.height=S; const mctx=mc.getContext('2d');
    const mi=mctx.createImageData(S,S);
    for(let i=0;i<plane;i++){ const a=Math.round(((mask[i]-mn)/rng)*255);
      mi.data[i*4]=255; mi.data[i*4+1]=255; mi.data[i*4+2]=255; mi.data[i*4+3]=a; }
    mctx.putImageData(mi,0,0);
    const m0=document.createElement('canvas'); m0.width=w0; m0.height=h0;
    m0.getContext('2d').drawImage(mc,ox,oy,dw,dh,0,0,w0,h0);
    return m0;
  }

  document.getElementById('btnAI').addEventListener('click', async ()=>{
    const btn=document.getElementById('btnAI');
    if(!currentImg || currentImg.tagName!=='IMG'){ setStatus('请先「上传图片」或「载入示例照片」。'); return; }
    btn.disabled=true;
    try{ const mask=await segment(currentImg); buildFromMask(currentImg,mask);
      setStatus('✅ 抠像完成。移动鼠标 / 拖动看主体视差（无残影）。强度滑块调幅度。');
    }catch(err){ setStatus('抠像失败：'+err.message+'<br><span style="color:#8aa07c">可改用「手动上传遮罩」。</span>'); }
    finally{ btn.disabled=false; }
  });
})();
</script>
</body>
</html>
