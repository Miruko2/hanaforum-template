name: Supabase Keepalive

on:
  schedule:
    # Runs every 4 days at 12:37 UTC. The non-zero minute avoids GitHub's top-of-hour queue.
    - cron: "37 12 */4 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing GitHub secret: NEXT_PUBLIC_SUPABASE_URL"
            exit 1
          fi

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing GitHub secret: NEXT_PUBLIC_SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Ping Supabase REST API
        run: |
          set -euo pipefail

          status_code=$(curl -sS \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            -o /tmp/supabase-keepalive-response.txt \
            -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/posts?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "Supabase keepalive status: ${status_code}"

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Supabase keepalive request failed. Response body:"
            cat /tmp/supabase-keepalive-response.txt
            exit 1
          fi
